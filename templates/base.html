<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Paper Intelligence{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    {% block head %}{% endblock %}
  </head>
  <body>
    <nav class="nav">
      <a href="/" class="nav__logo">
        <span class="nav__logo-mark">⬡</span>
        <span class="nav__logo-text">Paper Intelligence</span>
      </a>
      <ul class="nav__links">
        <li>
          <a
            href="/"
            class="nav__link {% if request.path == '/' %}nav__link--active{% endif %}"
            >Search</a
          >
        </li>
        <li>
          <a
            href="/api/compare?q=transformer"
            class="nav__link {% if 'compare' in request.path %}nav__link--active{% endif %}"
            >Compare</a
          >
        </li>
      </ul>
    </nav>

    <main class="main">{% block content %}{% endblock %}</main>

    <footer class="footer">
      <p class="footer__text">
        Powered by arXiv · sentence-transformers · FAISS · BERT · BART
      </p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
